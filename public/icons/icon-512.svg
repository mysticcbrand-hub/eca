    </linearGradient>
    <radialGradient id='mesh1' cx='20%' cy='20%' r='60%'>
      <stop offset='0%' stop-color='#5DEBE8' stop-opacity='0.55'/>
      <stop offset='60%' stop-color='#3DDB82' stop-opacity='0.30'/>
      <stop offset='100%' stop-color='#0D0D12' stop-opacity='0'/>
    </radialGradient>
    <radialGradient id='mesh2' cx='80%' cy='25%' r='55%'>
      <stop offset='0%' stop-color='#4D9EFF' stop-opacity='0.40'/>
      <stop offset='65%' stop-color='#3DDB82' stop-opacity='0.22'/>
      <stop offset='100%' stop-color='#0D0D12' stop-opacity='0'/>
    </radialGradient>
    <radialGradient id='mesh3' cx='50%' cy='90%' r='65%'>
