<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 1024 1024">
  <defs>
    <!-- Flat, robust gradients (no filters) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A10"/>
      <stop offset="100%" stop-color="#14141F"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1AAE4F"/>
      <stop offset="55%" stop-color="#30D158"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>
    <!-- Subtle specular sweep (simple opacity gradient) -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square (align to pixel grid) -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>

  <!-- Top light line (no blur) -->
  <rect x="192" y="192" width="640" height="2" fill="url(#shine)"/>

  <!-- Donut ring (C) as filled evenodd path (no stroke rendering issues) -->
  <path fill="url(#ring)" fill-rule="evenodd" d="
    M 512 248
    A 264 264 0 1 1 511.99 248
    Z
    M 512 320
    A 192 192 0 1 0 512.01 320
    Z
  "/>


</svg>
